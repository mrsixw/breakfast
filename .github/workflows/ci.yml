name: CI

on:
  pull_request:
  push:

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Run tests
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Run lint
        run: make lint

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Build binary
        run: make build

      - name: Verify binary version
        run: utils/check_binary_version.sh

  spell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check spelling
        uses: crate-ci/typos@master

  man:
    runs-on: ubuntu-latest
    needs: [test, lint, spell]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Generate man page
        run: make man

      - name: Verify man page
        run: |
          test -f man1/breakfast.1.gz
          man -l man1/breakfast.1.gz | head -1 | grep -q "breakfast"

  completions:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Generate completion scripts
        run: make completions

      - name: Install zsh and fish
        run: sudo apt-get install -y zsh fish

      - name: Verify completion scripts
        run: |
          test -f completions/breakfast.bash
          test -f completions/_breakfast
          test -f completions/breakfast.fish
          source completions/breakfast.bash && complete -p breakfast
          zsh -c "autoload -Uz compinit && compinit && source completions/_breakfast && echo 'zsh ok'"
          fish -c "source completions/breakfast.fish && echo 'fish ok'"

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, man, completions]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install git-mkver
        run: utils/install_git_mkver.sh

      - name: Fetch tags
        run: git fetch --tags

      - name: Read version
        id: version
        run: echo "version=$(python utils/read_version.py)" >> "$GITHUB_OUTPUT"

      - name: Bump version if tag exists
        id: bump
        run: |
          version="$(utils/bump_version_if_tag_exists.sh "${{ steps.version.outputs.version }}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: make release

      - name: Generate man page
        run: make man

      - name: Generate completion scripts
        run: make completions

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: utils/create_release.sh "${{ steps.bump.outputs.version }}"

  verify-release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install latest release
        run: |
          curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/install.sh | bash

      - name: Verify installation
        run: |
          ~/.local/bin/breakfast --version
          ls -l ~/.config/breakfast/config.toml

      - name: Verify man page
        run: |
          export MANPATH="${HOME}/.local/share/man:${MANPATH}"
          man breakfast | head -1 | grep -q "breakfast"

      - name: Install zsh and fish
        run: sudo apt-get install -y zsh fish

      - name: Verify bash completions
        run: |
          source ~/.local/share/bash-completion/completions/breakfast
          complete -p breakfast

      - name: Verify zsh completions
        run: zsh -c "source ~/.local/share/zsh/site-functions/_breakfast && echo 'zsh ok'"

      - name: Verify fish completions
        run: fish -c "source ~/.config/fish/completions/breakfast.fish && echo 'fish ok'"
